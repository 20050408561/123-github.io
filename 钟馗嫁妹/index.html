<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钟馗嫁妹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 音效元素 -->
    <audio id="background-music" loop="loop" volume="0.2">
        <source src="https://www.soundjay.com/horror/sounds/horror-07.mp3" type="audio/mpeg">
    </audio>
    <audio id="card-flip">
        <source src="https://www.soundjay.com/misc/sounds/page-flip-01.mp3" type="audio/mpeg">
    </audio>
    <audio id="modal-open">
        <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
    </audio>
    <audio id="modal-close">
        <source src="https://www.soundjay.com/buttons/sounds/button-10.mp3" type="audio/mpeg">
    </audio>
    <div class="container">
        <h1>钟馗嫁妹</h1>
        <div class="card-container">
            <!-- 卡牌将通过JavaScript动态生成 -->
        </div>
        <div id="modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <div class="modal-body">
                    <h2 id="modal-title"></h2>
                    <p id="modal-content"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
